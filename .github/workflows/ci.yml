name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: node --test --test-reporter=spec background.test.js
      - name: web-ext lint (non-blocking)
        run: npx web-ext lint || true

# Optional: add web-ext build and XPI packing steps in release workflows
