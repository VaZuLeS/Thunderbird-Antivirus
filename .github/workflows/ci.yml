name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Pre-submit checks (manifest, privacy, permissions)
        run: node ./scripts/pre-submit-checks.js
      - name: Run unit tests
        run: node --test background.test.js
      - name: web-ext lint
        run: npx web-ext lint

# Optional: add web-ext build and XPI packing steps in release workflows
